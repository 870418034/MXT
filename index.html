        .modal { animation: pop 0.3s ease-out; }
        @keyframes pop { from { transform: scale(0.7); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .tab-active { border-bottom: 4px solid #fbbf24; font-weight: bold; }

    </style>

                <div class="glass p-5 rounded-2xl text-xs">

                </div>
            </div>

            <!-- 办公室 -->
            <div id="content2" class="hidden grid grid-cols-2 gap-4" style="max-height:420px;overflow-y:auto"></div>

            <!-- 我的收藏 -->
            <div id="content3" class="hidden">
                <div id="collectionGrid" class="grid grid-cols-4 gap-3"></div>
            </div>

            <!-- 每日福利 -->
            <div id="content4" class="hidden text-center">
                <div class="glass p-8 rounded-3xl">
                    <div class="text-6xl mb-4">📅</div>
                    <p class="text-2xl font-bold mb-2">每日签到</p>
                    <p id="dailyStatus" class="text-xl text-emerald-400">可领取 10000 MXT</p>
                    <button onclick="claimDaily()" id="dailyBtn" class="mt-8 w-full bg-green-600 hover:bg-green-700 py-6 rounded-3xl font-bold text-2xl">领取奖励</button>
                </div>
            </div>

            <!-- Swap 页面 -->
            <div id="content5" class="hidden">
                <div class="glass p-6 rounded-3xl">
                    <h2 class="text-2xl font-bold mb-4 text-center">🔄 博饼 Swap（MXT ↔ USDT）</h2>
                    <div class="flex justify-between items-center mb-4">
                        <select id="swapDirection" onchange="updateSwapQuote()" class="bg-white/10 p-3 rounded-2xl text-lg">
                            <option value="0">MXT → USDT</option>
                            <option value="1">USDT → MXT</option>
                        </select>
                    </div>
                    <input id="swapAmount" type="number" placeholder="输入数量" 
                           class="w-full bg-white/10 p-5 rounded-3xl text-3xl mb-4" onkeyup="updateSwapQuote()">
                    <div class="text-center text-sm opacity-75 mb-6">
                        ≈ <span id="swapOutput" class="text-emerald-400 font-bold text-2xl">0</span> 
                        <span id="toSymbol" class="font-bold">USDT</span>
                    </div>
                    <button onclick="executeSwap()" 
                            class="w-full bg-gradient-to-r from-pink-500 to-violet-500 py-6 rounded-3xl font-bold text-2xl">
                        🚀 执行 Swap
                    </button>
                </div>
            </div>

            <p id="status" class="text-center text-sm h-8 mt-4 text-amber-300"></p>
        </div>
    </div>
</div>
